
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POLAGRANDE 상담관리 2.0</title>
<script src="config.js"></script>
<script src="pricing.js"></script>
<script src="app.js" defer></script>
<style>
body{font-family:Malgun Gothic;margin:0;padding:20px;background:#f8f5f2;}
.container{max-width:1200px;margin:auto;background:white;padding:20px;border-radius:10px;}
.grid{display:grid;gap:15px;}
@media(min-width:900px){.grid{grid-template-columns:1fr 1fr;}}
input,select{width:100%;padding:8px;}
button{padding:10px 20px;background:#8B4513;color:white;border:none;border-radius:5px;}
.section{margin-bottom:20px;}
</style>
</head>
<body>
<div class="container">

<h2>상담 등록</h2>

<div class="grid">

<div class="section">
<label>고객명</label><input id="name">
<label>연락처</label><input id="phone">
<label>행사일</label><input type="date" id="date">
<label>인원</label><input type="number" id="guest">
</div>

<div class="section">
<label>카테고리</label>
<select id="category"></select>

<label>상세유형</label>
<select id="subType"></select>

<label>식사타입</label>
<select id="mealType">
<option value="western">양식 5.5</option>
<option value="korean">한식 5.9</option>
</select>

<label>기업/대관 식대 직접입력</label>
<input type="number" id="customMeal">
</div>

</div>

<div class="section">
<h4>옵션</h4>
<div id="optionArea"></div>
<label>기타옵션 금액</label>
<input type="number" id="customOption">
</div>

<div class="section">
<h4>프로모션 할인</h4>
<input type="number" id="promotion">
</div>

<div class="section">
<button onclick="calculate()">금액 계산</button>
<h3 id="result"></h3>
</div>

</div>
</body>
</html>
